name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: brew install xcodegen create-dmg

      - name: Build and package
        run: |
          chmod +x scripts/build.sh
          VERSION="${{ steps.version.outputs.version }}" ./scripts/build.sh

      - name: Create release zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          APP_PATH="build/SitWatcher.xcarchive/Products/Applications/SitWatcher.app"
          ditto -c -k --keepParent "$APP_PATH" "build/SitWatcher-${VERSION_NUM}.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: |
            build/SitWatcher.dmg
            build/SitWatcher-*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
