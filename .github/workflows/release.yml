name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: brew install xcodegen create-dmg

      - name: Build and package
        run: |
          chmod +x scripts/build.sh
          VERSION="${{ steps.version.outputs.version }}" ./scripts/build.sh

      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION="2.6.0"
          curl -sL -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          tar xf sparkle.tar.xz
          chmod +x bin/generate_appcast

      - name: Prepare appcast archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          mkdir -p appcast
          # Sparkle needs a single .app in the archive, so zip just the app
          APP_PATH="build/SitWatcher.xcarchive/Products/Applications/SitWatcher.app"
          ditto -c -k --keepParent "$APP_PATH" "appcast/SitWatcher-${VERSION_NUM}.zip"

      - name: Generate appcast
        env:
          SPARKLE_ED25519_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
        run: |
          printf '%s' "$SPARKLE_ED25519_PRIVATE_KEY" > /tmp/ed25519_private_key
          ./bin/generate_appcast \
            --ed-key-file /tmp/ed25519_private_key \
            --download-url-prefix "https://Aarontaken.github.io/sit-watcher/" \
            appcast/
          rm /tmp/ed25519_private_key

      - name: Deploy appcast to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appcast
          keep_files: true
          publish_branch: gh-pages

      - name: Create zip for install script
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          APP_PATH="build/SitWatcher.xcarchive/Products/Applications/SitWatcher.app"
          ditto -c -k --keepParent "$APP_PATH" "build/SitWatcher-${VERSION_NUM}.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: |
            build/SitWatcher.dmg
            build/SitWatcher-*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
