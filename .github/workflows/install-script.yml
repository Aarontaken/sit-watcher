name: Verify install script

on:
  push:
    branches: [master, main]
    paths:
      - "install.sh"
      - "scripts/verify-install.sh"
      - ".github/workflows/install-script.yml"
  pull_request:
    paths:
      - "install.sh"
      - "scripts/verify-install.sh"
      - ".github/workflows/install-script.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify remote zip resolves for latest release
        run: bash scripts/verify-install.sh
