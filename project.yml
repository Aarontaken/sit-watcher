name: SitWatcher
options:
  bundleIdPrefix: com.sitwatcher
  developmentLanguage: en
  knownRegions:
    - en
    - zh-Hans
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
  configs:
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "-"

targets:
  SitWatcher:
    type: application
    platform: macOS
    sources:
      - SitWatcher
    settings:
      base:
        INFOPLIST_FILE: SitWatcher/Info.plist
        CODE_SIGN_ENTITLEMENTS: SitWatcher/SitWatcher.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.sitwatcher.app
        MARKETING_VERSION: "1.0.24"
        CURRENT_PROJECT_VERSION: "24"
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"

  SitWatcherTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SitWatcherTests
    dependencies:
      - target: SitWatcher
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SitWatcher.app/Contents/MacOS/SitWatcher"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.sitwatcher.app.tests
